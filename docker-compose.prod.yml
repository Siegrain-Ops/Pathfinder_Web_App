services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-railway}
      MYSQL_USER: ${MYSQL_USER:-pathfinder}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
    volumes:
      - mysql_prod_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-pathfinder}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-railway}
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-https://pathlegends.com}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://pathlegends.com}
      EXTRA_ORIGINS: ${EXTRA_ORIGINS:-https://www.pathlegends.com}
      COOKIE_SECURE: "true"
      APP_BASE_URL: ${APP_BASE_URL:-https://pathlegends.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-PathLegends <noreply@pathlegends.com>}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ${HOME}/.cloudflared:/etc/cloudflared:ro

volumes:
  mysql_prod_data:
